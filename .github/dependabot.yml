version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    groups:
      rust-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /src-sidecar
    schedule:
      interval: weekly
      day: monday
    groups:
      go-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-deps:
        patterns: ["*"]
        exclude-patterns: ["@tauri-apps/*"]
      tauri:
        patterns: ["@tauri-apps/*"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 3
