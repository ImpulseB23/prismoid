name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
            go:
              - 'src-sidecar/**'
            typescript:
              - 'src/**'
              - 'package.json'
              - 'bun.lockb'
              - 'tsconfig.json'
              - 'vite.config.*'

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --quiet

      - name: Test with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path coverage-rust.lcov

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: src-tauri/coverage-rust.lcov
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  go:
    name: Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-sidecar
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: src-sidecar/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage-go.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: src-sidecar/coverage-go.txt
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}

  typescript:
    name: TypeScript
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint .

      - name: Format check
        run: bunx prettier --check .

      - name: Test with coverage
        run: bunx vitest run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          flags: typescript
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    needs: [changes, rust, go, typescript]
    if: |
      always() &&
      (needs.rust.result == 'success' || needs.rust.result == 'skipped') &&
      (needs.go.result == 'success' || needs.go.result == 'skipped') &&
      (needs.typescript.result == 'success' || needs.typescript.result == 'skipped') &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.typescript == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: src-sidecar/go.sum

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Go sidecar
        working-directory: src-sidecar
        run: go build -o ../src-tauri/binaries/ ./cmd/sidecar

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
