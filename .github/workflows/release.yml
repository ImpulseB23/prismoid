name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            sidecar_target: x86_64-pc-windows-msvc
            sidecar_ext: .exe
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            sidecar_target: aarch64-apple-darwin
            sidecar_ext: ""
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            sidecar_target: x86_64-apple-darwin
            sidecar_ext: ""
          - platform: ubuntu-latest
            args: ""
            sidecar_target: x86_64-unknown-linux-gnu
            sidecar_ext: ""
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify YouTube OAuth secrets are present
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          missing=()
          [ -z "$GOOGLE_CLIENT_ID" ] && missing+=(GOOGLE_CLIENT_ID)
          [ -z "$GOOGLE_CLIENT_SECRET" ] && missing+=(GOOGLE_CLIENT_SECRET)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required repo secret(s): ${missing[*]}. Set them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          cache-on-failure: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/src-sidecar/go.sum

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Go sidecar
        working-directory: apps/desktop/src-sidecar
        run: go build -o "../src-tauri/binaries/sidecar-${{ matrix.sidecar_target }}${{ matrix.sidecar_ext }}" ./cmd/sidecar

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Prismoid ${{ github.ref_name }}"
          releaseBody: "See the [changelog](https://github.com/ImpulseB23/Prismoid/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
