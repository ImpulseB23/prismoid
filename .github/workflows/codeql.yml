name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "src-sidecar/**"
      - "src/**"
  pull_request:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "src-sidecar/**"
      - "src/**"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript, rust]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@v4
