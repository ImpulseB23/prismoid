steps:
  - uses: actions/checkout@v4

  - uses: dtolnay/rust-toolchain@stable

  - uses: actions/setup-go@v5
    with:
      go-version: "1.22"

  - uses: pnpm/action-setup@v5

  - uses: actions/setup-node@v4
    with:
      node-version: "20"
      cache: pnpm

  - run: pnpm install --frozen-lockfile
