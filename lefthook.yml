commit-msg:
  jobs:
    - name: commitlint
      run: cd apps/desktop && bunx commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - name: rustfmt
      glob: "*.rs"
      root: apps/desktop/src-tauri
      run: cargo fmt -- --check

    - name: clippy
      glob: "*.rs"
      root: apps/desktop/src-tauri
      run: cargo clippy -- -D warnings

    - name: gofmt
      glob: "*.go"
      root: apps/desktop/src-sidecar
      run: gofmt -l -d {staged_files}

    - name: eslint
      glob: "*.{ts,tsx}"
      root: apps/desktop
      run: bunx eslint {staged_files}

    - name: prettier
      glob: "*.{ts,tsx,js,json,css,html,md,yml,yaml}"
      run: bunx prettier --check {staged_files}

    - name: tsc
      glob: "*.{ts,tsx}"
      root: apps/desktop
      run: bunx tsc --noEmit

pre-push:
  parallel: true
  jobs:
    - name: cargo-test
      root: apps/desktop/src-tauri
      run: cargo test

    - name: go-test
      root: apps/desktop/src-sidecar
      run: go test ./...

    - name: vitest
      root: apps/desktop
      run: bunx vitest run
